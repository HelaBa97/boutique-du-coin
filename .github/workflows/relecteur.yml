name: tests

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Configurer OpenCode
        run: |
          cat > opencode.json << 'EOF'
          {
            "$schema": "https://opencode.ai/config.json",
            "model": "google/gemini-flash-latest",
            "provider": {
              "google": {
                "options": {
                  "apiKey": "{env:GEMINI_API_KEY}"
                },
                "models": {
                  "gemini-flash-latest": {
                    "name": "Gemini Flash (formation)"
                  }
                }
              }
            }
          }
          EOF

      - name: Relire les changements et rendre le verdict
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          git fetch origin master
          git diff origin/master...HEAD > changements.diff
          {
            echo "--- CONVENTIONS.md (regles du projet) ---"
            cat CONVENTIONS.md
            echo ""
            echo "--- CHANGEMENTS A JUGER ---"
            echo "Tu es le critique de la Boutique du Coin."
            echo "Lis les regles ci-dessus (CONVENTIONS.md) : c'est la loi."
            echo "Puis juge UNIQUEMENT les changements ci-dessous (un diff git),"
            echo "en francais, au format de verdict exige par les conventions."
            echo "Tu ne corriges JAMAIS : tu juges, c'est tout."
            echo ""
            echo "Les changements a juger :"
            echo ""
            cat changements.diff
          } > mission.txt
          echo "=== Contenu de mission.txt (debut) ==="
          head -c 200 mission.txt
          echo ""
          echo "=== Test simple opencode run ==="
          echo "dis bonjour" > /tmp/test.txt
          $HOME/.opencode/bin/opencode run --print-logs "dis hello en 5 mots" > /tmp/result.txt 2>&1 || true
          cat /tmp/result.txt
          echo "=== Fin test simple ==="
          $HOME/.opencode/bin/opencode run "$(cat mission.txt)" > verdict.md 2>&1 || true
          if [ ! -s verdict.md ]; then
            echo "Le relecteur n'a pas pu rendre son verdict. Verifier la cle GEMINI_API_KEY dans Settings > Secrets and variables > Actions." > verdict.md
          fi

      - name: Poster le verdict en commentaire de la PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file verdict.md
